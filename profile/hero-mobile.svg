        <text x="51" y="431" fill="#E8EDF4">cat education</text>
        <text x="30" y="465" fill="#94A3B3">MS Computer Science · NTUST, Taiwan</text>

        <text x="30" y="511" fill="#3FDD78">$</text>
        <text x="51" y="511" fill="#E8EDF4">./status</text>
