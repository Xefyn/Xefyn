    <text id="stat-scope" x="340" y="1207" fill="#64748B" font-family="Consolas, DejaVu Sans Mono, monospace" font-size="12" text-anchor="middle">public + private · 19 non-fork repos · merges excluded · 12 Jul 2026</text>
