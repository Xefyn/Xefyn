        <text x="56" y="555" fill="#94A3B3">open to full-time roles &amp; freelance projects</text>
      </g>
    </g>

    <path d="M28 883H652" stroke="#223042"/>
    <circle cx="35" cy="920" r="6" fill="#3FDD78" filter="url(#statusGlow)"/>
    <text x="54" y="927" fill="#E8EDF4" font-family="Consolas, DejaVu Sans Mono, monospace" font-size="20" font-weight="700">$ github --stats</text>

    <g>
      <rect x="28" y="952" width="300" height="105" rx="14" fill="#10161F" stroke="#223042"/>
      <text id="stat-repositories" x="52" y="999" fill="#E8EDF4" font-size="32" font-weight="700">23</text>
      <text x="52" y="1032" fill="#94A3B3" font-family="Consolas, DejaVu Sans Mono, monospace" font-size="14">repositories</text>
