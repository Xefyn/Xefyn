      <rect x="1" y="1" width="622" height="48" rx="17" fill="#10161F"/>
      <path d="M1 49H623" stroke="#223042"/>
      <circle cx="26" cy="25" r="6" fill="#FF5F57"/>
      <circle cx="47" cy="25" r="6" fill="#FEBC2E"/>
      <circle cx="68" cy="25" r="6" fill="#3FDD78"/>
      <text x="591" y="31" fill="#64748B" font-family="Consolas, DejaVu Sans Mono, monospace" font-size="13" text-anchor="end">xefyn@dev:~</text>

      <g font-family="Consolas, DejaVu Sans Mono, monospace" font-size="18">
        <text x="30" y="89" fill="#3FDD78">$</text>
        <text x="51" y="89" fill="#E8EDF4">whoami</text>
        <text x="30" y="123" fill="#94A3B3">richard-ivan · full-stack developer</text>

        <text x="30" y="169" fill="#3FDD78">$</text>
        <text x="51" y="169" fill="#E8EDF4">cat stack.json</text>
        <text x="30" y="203" fill="#E8EDF4">{</text>
        <text x="54" y="237" fill="#4E9EFF">"frontend"</text>
        <text x="162" y="237" fill="#E8EDF4">: [</text>
        <text x="195" y="237" fill="#3FDD78">"next.js", "react", "typescript"</text>
        <text x="506" y="237" fill="#E8EDF4">],</text>
        <text x="54" y="271" fill="#4E9EFF">"backend"</text>
        <text x="151" y="271" fill="#E8EDF4">:  [</text>
        <text x="195" y="271" fill="#3FDD78">"node", "prisma", "postgresql"</text>
        <text x="517" y="271" fill="#E8EDF4">]</text>
        <text x="30" y="305" fill="#E8EDF4">}</text>

        <text x="30" y="351" fill="#3FDD78">$</text>
        <text x="51" y="351" fill="#E8EDF4">uptime</text>
