    <text x="42" y="139" fill="#E8EDF4" font-size="52" font-weight="700" letter-spacing="-1">Richard Ivan</text>
    <text x="42" y="181" fill="#4E9EFF" font-size="25" font-weight="700">Full-Stack Developer</text>
    <text x="42" y="222" fill="#94A3B3" font-size="17">Reliable web systems, from database to interface.</text>

    <g transform="translate(28 265)">
