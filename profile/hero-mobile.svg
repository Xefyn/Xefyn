<svg width="680" height="1230" viewBox="0 0 680 1230" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc stats-desc">
  <title id="title">Richard Ivan — Full-Stack Developer</title>
  <desc id="desc">Richard Ivan's mobile developer profile showing his stack, experience, education, and availability.</desc>
  <desc id="stats-desc">23 repositories, 370 authored commits, 376,411 lines added, and 134,033 lines removed.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="680" y2="1230" gradientUnits="userSpaceOnUse">
      <stop stop-color="#090D12"/>
      <stop offset="0.64" stop-color="#10161F"/>
      <stop offset="1" stop-color="#10233C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(580 710) rotate(180) scale(360 350)">
      <stop stop-color="#2F80ED" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#2F80ED" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#94A3B3" stroke-opacity="0.035"/>
    </pattern>
    <filter id="statusGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="680" height="1230" rx="24" fill="url(#background)"/>
  <rect x="1" y="1" width="678" height="1228" rx="23" stroke="#223042" stroke-width="2"/>
  <rect width="680" height="1230" rx="24" fill="url(#grid)"/>
  <rect width="680" height="1230" rx="24" fill="url(#glow)"/>

  <g font-family="Arial, DejaVu Sans, sans-serif">
