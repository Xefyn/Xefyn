      <text x="52" y="1157" fill="#94A3B3" font-family="Consolas, DejaVu Sans Mono, monospace" font-size="14">lines added</text>
      <rect x="299" y="1099" width="6" height="61" rx="3" fill="#3FDD78"/>
    </g>

    <g>
      <rect x="352" y="1077" width="300" height="105" rx="14" fill="#10161F" stroke="#223042"/>
      <text id="stat-deletions" x="376" y="1124" fill="#FF6B6B" font-size="32" font-weight="700">−134,033</text>
      <text x="376" y="1157" fill="#94A3B3" font-family="Consolas, DejaVu Sans Mono, monospace" font-size="14">lines removed</text>
      <rect x="623" y="1099" width="6" height="61" rx="3" fill="#FF6B6B"/>
